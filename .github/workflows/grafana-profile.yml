name: Render Grafana Profile Panel

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      GRAFANA_GITHUB_TOKEN: ${{ secrets.GRAFANA_GITHUB_TOKEN != '' && secrets.GRAFANA_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start Grafana
        run: |
          docker run -d --name profile-grafana \
            -p 3000:3000 \
            -e GF_SECURITY_ADMIN_USER=admin \
            -e GF_SECURITY_ADMIN_PASSWORD=admin \
            -e GF_AUTH_ANONYMOUS_ENABLED=true \
            -e GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer \
            -e GF_AUTH_DISABLE_LOGIN_FORM=true \
            -e GF_INSTALL_PLUGINS=grafana-github-datasource \
            -e GRAFANA_GITHUB_TOKEN="${GRAFANA_GITHUB_TOKEN}" \
            -v "$PWD/grafana/provisioning:/etc/grafana/provisioning" \
            -v "$PWD/grafana/dashboards:/var/lib/grafana/dashboards" \
            grafana/grafana:12.0.2

      - name: Wait for Grafana
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker logs profile-grafana
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright package
        run: npm install --no-save playwright@1.54.2

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Render dashboard screenshot
        run: node scripts/render-grafana-profile.mjs

      - name: Stop Grafana
        if: always()
        run: docker rm -f profile-grafana || true

      - name: Commit updated image
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add assets/oss-contrib-grafana.png
          git diff --cached --quiet && exit 0
          git commit -m "Update Grafana OSS contribution panel"
          git push
