<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" role="img" aria-label="Orbital topology of Aharon Mark's platform engineering focus">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#12263b"/>
      <stop offset="55%" stop-color="#0c1420"/>
      <stop offset="100%" stop-color="#090d14"/>
    </radialGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#33b5e5"/>
      <stop offset="50%" stop-color="#8fe7ef"/>
      <stop offset="100%" stop-color="#73bf69"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#33b5e5"/>
      <stop offset="100%" stop-color="#73bf69"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { fill: #f2f5fb; font: 700 28px Inter, Arial, sans-serif; }
      .meta { fill: #a8b4c5; font: 600 14px Inter, Arial, sans-serif; }
      .mono { fill: #90e0ef; font: 700 14px "SFMono-Regular", Consolas, monospace; }
      .label { fill: #d7e2f0; font: 700 19px Inter, Arial, sans-serif; }
      .sub { fill: #91a0b5; font: 500 13px Inter, Arial, sans-serif; }
      .tiny { fill: #89a0b4; font: 600 12px "SFMono-Regular", Consolas, monospace; letter-spacing: 1.2px; }
      .coreTitle { fill: #071018; font: 800 28px Inter, Arial, sans-serif; }
      .coreSub { fill: #0d2430; font: 700 14px "SFMono-Regular", Consolas, monospace; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="24" fill="url(#bgGlow)"/>
  <rect x="8" y="8" width="1184" height="504" rx="22" fill="none" stroke="#243244"/>
  <rect x="8" y="8" width="1184" height="5" rx="3" fill="url(#frameGrad)"/>

  <g opacity="0.75">
    <circle cx="80" cy="86" r="2.1" fill="#8fe7ef"/>
    <circle cx="168" cy="48" r="1.3" fill="#33b5e5"/>
    <circle cx="1086" cy="74" r="2.0" fill="#8fe7ef"/>
    <circle cx="1140" cy="118" r="1.5" fill="#33b5e5"/>
    <circle cx="1048" cy="432" r="2.0" fill="#73bf69"/>
    <circle cx="972" cy="454" r="1.2" fill="#8fe7ef"/>
    <circle cx="142" cy="420" r="1.7" fill="#73bf69"/>
    <circle cx="88" cy="390" r="1.2" fill="#33b5e5"/>
    <circle cx="320" cy="84" r="1.2" fill="#73bf69"/>
    <circle cx="918" cy="108" r="1.2" fill="#33b5e5"/>
  </g>

  <text x="40" y="54" class="title">Orbital Control Plane</text>
  <text x="40" y="80" class="meta">Platform engineering rendered as a living systems map</text>
  <text x="1158" y="54" text-anchor="end" class="mono">amark.dev / devops / israel</text>

  <g opacity="0.95">
    <ellipse cx="600" cy="262" rx="176" ry="120" fill="none" stroke="#28435a" stroke-width="2"/>
    <ellipse cx="600" cy="262" rx="248" ry="170" fill="none" stroke="#23364a" stroke-width="2"/>
    <ellipse cx="600" cy="262" rx="330" ry="218" fill="none" stroke="#1d2a39" stroke-width="2"/>
  </g>

  <g>
    <circle cx="600" cy="262" r="72" fill="url(#coreGrad)" filter="url(#softGlow)" opacity="0.95"/>
    <circle cx="600" cy="262" r="88" fill="none" stroke="#4fbfe3" stroke-opacity="0.30"/>
    <text x="600" y="252" text-anchor="middle" class="coreTitle">amark.dev</text>
    <text x="600" y="276" text-anchor="middle" class="coreSub">PLATFORM CORE</text>
    <text x="600" y="298" text-anchor="middle" class="tiny" fill="#143545">ship | automate | observe</text>
  </g>

  <g transform="translate(600 262)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="22s" repeatCount="indefinite"/>
      <g transform="translate(176 0)">
        <circle r="16" fill="#33b5e5"/>
        <text y="6" text-anchor="middle" class="tiny" fill="#081018">K8S</text>
      </g>
      <g transform="translate(-96 -86)">
        <circle r="16" fill="#8fe7ef"/>
        <text y="6" text-anchor="middle" class="tiny" fill="#081018">IAC</text>
      </g>
      <g transform="translate(-78 90)">
        <circle r="16" fill="#73bf69"/>
        <text y="6" text-anchor="middle" class="tiny" fill="#081018">SRE</text>
      </g>
    </g>
  </g>

  <g transform="translate(600 262)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="30s" repeatCount="indefinite"/>
      <g transform="translate(0 -170)">
        <circle r="15" fill="#f59e0b"/>
        <text y="6" text-anchor="middle" class="tiny" fill="#111217">CI</text>
      </g>
      <g transform="translate(214 24)">
        <circle r="15" fill="#a78bfa"/>
        <text y="6" text-anchor="middle" class="tiny" fill="#111217">OSS</text>
      </g>
      <g transform="translate(-226 18)">
        <circle r="15" fill="#fb7185"/>
        <text y="6" text-anchor="middle" class="tiny" fill="#111217">OBS</text>
      </g>
    </g>
  </g>

  <g transform="translate(600 262)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="42s" repeatCount="indefinite"/>
      <g transform="translate(330 0)">
        <circle r="13" fill="#73bf69"/>
      </g>
      <g transform="translate(-210 -144)">
        <circle r="13" fill="#33b5e5"/>
      </g>
      <g transform="translate(-220 138)">
        <circle r="13" fill="#8fe7ef"/>
      </g>
      <g transform="translate(136 184)">
        <circle r="13" fill="#33b5e5"/>
      </g>
    </g>
  </g>

  <g>
    <line x1="772" y1="188" x2="900" y2="122" stroke="#2d455d" stroke-width="2"/>
    <circle cx="772" cy="188" r="4" fill="#33b5e5"/>
    <text x="916" y="118" class="label">GitOps workflows</text>
    <text x="916" y="140" class="sub">ArgoCD-flavored delivery, drift control, safer rollouts</text>

    <line x1="700" y1="344" x2="864" y2="410" stroke="#2d455d" stroke-width="2"/>
    <circle cx="700" cy="344" r="4" fill="#73bf69"/>
    <text x="882" y="408" class="label">Observability loops</text>
    <text x="882" y="430" class="sub">Prometheus, Grafana, event trails, faster debugging</text>

    <line x1="428" y1="178" x2="268" y2="108" stroke="#2d455d" stroke-width="2"/>
    <circle cx="428" cy="178" r="4" fill="#8fe7ef"/>
    <text x="84" y="106" class="label">Cloud systems</text>
    <text x="84" y="128" class="sub">AWS, Azure, GCP, Terraform, network-aware platform work</text>

    <line x1="424" y1="334" x2="234" y2="406" stroke="#2d455d" stroke-width="2"/>
    <circle cx="424" cy="334" r="4" fill="#fb7185"/>
    <text x="84" y="404" class="label">Open source orbit</text>
    <text x="84" y="426" class="sub">Jenkins contributions, PatchPulse, upstream collaboration</text>
  </g>

  <g>
    <rect x="884" y="258" width="262" height="120" rx="16" fill="#131b26" stroke="#2a3d52"/>
    <text x="908" y="286" class="mono">MISSION SIGNAL</text>
    <text x="908" y="314" class="label">Turn manual ops into reusable systems</text>
    <text x="908" y="338" class="sub">Kubernetes guardrails, CI/CD plumbing, IaC, and calm-on-call tooling.</text>
    <text x="908" y="364" class="tiny">PATCHPULSE / JENKINS / PLATFORM ENGINEERING</text>
  </g>
</svg>
