<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" preserveAspectRatio="xMidYMid slice" width="1200" height="220">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="50%"  stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>

    <!-- Cyan glow gradient for text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00b4d8"/>
      <stop offset="50%"  stop-color="#90e0ef"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>

    <!-- Typewriter clipPath — expands left-to-right to reveal name -->
    <clipPath id="typeClip">
      <rect x="150" y="30" height="100" width="0">
        <animate attributeName="width" from="0" to="900" dur="1.8s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
      </rect>
    </clipPath>

    <!-- Subtitle reveal clipPath -->
    <clipPath id="subClip">
      <rect x="200" y="120" height="50" width="0">
        <animate attributeName="width" from="0" to="800" dur="1.4s" begin="2.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#00b4d8" stroke-opacity="0.04" stroke-width="1">
    <line x1="0"    y1="40"  x2="1200" y2="40"/>
    <line x1="0"    y1="80"  x2="1200" y2="80"/>
    <line x1="0"    y1="120" x2="1200" y2="120"/>
    <line x1="0"    y1="160" x2="1200" y2="160"/>
    <line x1="150"  y1="0"   x2="150"  y2="220"/>
    <line x1="300"  y1="0"   x2="300"  y2="220"/>
    <line x1="450"  y1="0"   x2="450"  y2="220"/>
    <line x1="600"  y1="0"   x2="600"  y2="220"/>
    <line x1="750"  y1="0"   x2="750"  y2="220"/>
    <line x1="900"  y1="0"   x2="900"  y2="220"/>
    <line x1="1050" y1="0"   x2="1050" y2="220"/>
  </g>

  <!-- Animated floating dots (star field) -->
  <circle cx="80"   cy="40"  r="1.5" fill="#00b4d8" fill-opacity="0.6">
    <animate attributeName="fill-opacity" values="0.6;0.1;0.6" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200"  cy="20"  r="1"   fill="#90e0ef" fill-opacity="0.5">
    <animate attributeName="fill-opacity" values="0.5;0.1;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="35"  r="1.5" fill="#00b4d8" fill-opacity="0.7">
    <animate attributeName="fill-opacity" values="0.7;0.1;0.7" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="70"  r="1"   fill="#90e0ef" fill-opacity="0.4">
    <animate attributeName="fill-opacity" values="0.4;0.1;0.4" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950"  cy="25"  r="2"   fill="#00b4d8" fill-opacity="0.5">
    <animate attributeName="fill-opacity" values="0.5;0.2;0.5" dur="4.0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50"   cy="90"  r="1.5" fill="#90e0ef" fill-opacity="0.3">
    <animate attributeName="fill-opacity" values="0.3;0.8;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1150" cy="50"  r="1"   fill="#00b4d8" fill-opacity="0.6">
    <animate attributeName="fill-opacity" values="0.6;0.1;0.6" dur="3.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350"  cy="15"  r="1"   fill="#00b4d8" fill-opacity="0.4">
    <animate attributeName="fill-opacity" values="0.4;0.9;0.4" dur="2.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated wave — back layer -->
  <path fill="#00b4d8" fill-opacity="0.12">
    <animate attributeName="d"
      values="
        M0 175 Q150 155 300 175 Q450 195 600 175 Q750 155 900 175 Q1050 195 1200 175 L1200 220 L0 220 Z;
        M0 185 Q150 165 300 185 Q450 200 600 180 Q750 162 900 182 Q1050 200 1200 185 L1200 220 L0 220 Z;
        M0 175 Q150 155 300 175 Q450 195 600 175 Q750 155 900 175 Q1050 195 1200 175 L1200 220 L0 220 Z"
      dur="7s" repeatCount="indefinite"/>
  </path>

  <!-- Animated wave — front layer -->
  <path fill="#00b4d8" fill-opacity="0.22">
    <animate attributeName="d"
      values="
        M0 190 Q200 172 400 190 Q600 208 800 190 Q1000 172 1200 190 L1200 220 L0 220 Z;
        M0 198 Q200 180 400 195 Q600 210 800 195 Q1000 178 1200 196 L1200 220 L0 220 Z;
        M0 190 Q200 172 400 190 Q600 208 800 190 Q1000 172 1200 190 L1200 220 L0 220 Z"
      dur="5s" repeatCount="indefinite"/>
  </path>

  <!-- Scanning line that sweeps across once on load -->
  <rect x="-4" y="0" width="4" height="220" fill="#00b4d8" fill-opacity="0.15">
    <animate attributeName="x" from="-4" to="1204" dur="1.5s" begin="0s" fill="freeze"/>
    <animate attributeName="fill-opacity" values="0.15;0.05;0" dur="1.5s" begin="0s" fill="freeze"/>
  </rect>

  <!-- Bracket decoration left -->
  <text x="130" y="105" font-family="monospace" font-size="70" fill="#00b4d8" fill-opacity="0.25" font-weight="bold">{</text>
  <!-- Bracket decoration right -->
  <text x="1040" y="105" font-family="monospace" font-size="70" fill="#00b4d8" fill-opacity="0.25" font-weight="bold">}</text>

  <!-- Main name — typewriter reveal -->
  <text clip-path="url(#typeClip)"
        x="600" y="100"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="58"
        font-weight="bold"
        fill="url(#textGrad)"
        letter-spacing="2">
    amarkDOTdev
    <!-- Pulse after reveal -->
    <animate attributeName="fill-opacity" values="1;0.85;1" dur="2.5s" begin="2.2s" repeatCount="indefinite"/>
  </text>

  <!-- Cursor that blinks after name is typed -->
  <rect x="870" y="55" width="4" height="52" fill="#00b4d8">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" begin="2.1s" repeatCount="indefinite"/>
    <!-- Cursor slides in with the text reveal then stays -->
    <animate attributeName="x" from="600" to="870" dur="1.8s" begin="0.3s" fill="freeze"/>
  </rect>

  <!-- Subtitle — typewriter reveal after name -->
  <text clip-path="url(#subClip)"
        x="600" y="152"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="17"
        fill="#90e0ef"
        letter-spacing="3"
        fill-opacity="0.9">
    DevOps &amp; Platform Engineer  |  Israel
  </text>

</svg>
