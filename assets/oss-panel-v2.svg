<svg width="920" height="560" viewBox="0 0 920 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OSS contribution panel">
  <defs>
    <linearGradient id="topline" x1="20" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#33B5E5" />
      <stop offset="1" stop-color="#73BF69" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="920" height="560" rx="18" fill="#111217" />
  <rect x="0" y="0" width="920" height="4" rx="4" fill="url(#topline)" />
  <rect x="14" y="14" width="892" height="532" rx="16" fill="#161A22" stroke="#2A3441" />

  <text x="28" y="44" class="title">OSS Contribution Panel</text>
  <circle cx="286" cy="38" r="5" fill="#73BF69" filter="url(#glow)" />
  <text x="300" y="43" class="live">LIVE</text>
  <text x="892" y="43" text-anchor="end" class="meta">refreshed 2026-05-25 10:52 UTC</text>

  <rect x="28" y="62" width="200" height="84" rx="14" fill="#1D2430" stroke="#2F3B4C" />
  <text x="44" y="88" class="panelLabel">Open OSS PRs</text>
  <text x="44" y="125" class="bigValue">1</text>
  <text x="44" y="138" class="panelMeta">outside your own repos</text>

  <rect x="256" y="62" width="200" height="84" rx="14" fill="#1D2430" stroke="#2F3B4C" />
  <text x="272" y="88" class="panelLabel">Merged OSS PRs</text>
  <text x="272" y="125" class="bigValue">0</text>
  <text x="272" y="138" class="panelMeta">public merged history</text>

  <rect x="484" y="62" width="392" height="136" rx="14" fill="#1D2430" stroke="#2F3B4C" />
  <text x="500" y="88" class="panelLabel">Public PR activity (last 6 months)</text>
  
      <rect x="544" y="150" width="24" height="0" rx="6" fill="#33B5E5" opacity="0.22" />
      <text x="556" y="172" text-anchor="middle" class="axis">Dec</text>
      <text x="556" y="142" text-anchor="middle" class="tiny">0</text>
    
      <rect x="596" y="134" width="24" height="16" rx="6" fill="#33B5E5" opacity="0.88" />
      <text x="608" y="172" text-anchor="middle" class="axis">Jan</text>
      <text x="608" y="126" text-anchor="middle" class="tiny">1</text>
    
      <rect x="648" y="150" width="24" height="0" rx="6" fill="#33B5E5" opacity="0.22" />
      <text x="660" y="172" text-anchor="middle" class="axis">Feb</text>
      <text x="660" y="142" text-anchor="middle" class="tiny">0</text>
    
      <rect x="700" y="150" width="24" height="0" rx="6" fill="#33B5E5" opacity="0.22" />
      <text x="712" y="172" text-anchor="middle" class="axis">Mar</text>
      <text x="712" y="142" text-anchor="middle" class="tiny">0</text>
    
      <rect x="752" y="150" width="24" height="0" rx="6" fill="#33B5E5" opacity="0.22" />
      <text x="764" y="172" text-anchor="middle" class="axis">Apr</text>
      <text x="764" y="142" text-anchor="middle" class="tiny">0</text>
    
      <rect x="804" y="88" width="24" height="62" rx="6" fill="#33B5E5" opacity="0.88" />
      <text x="816" y="172" text-anchor="middle" class="axis">May</text>
      <text x="816" y="80" text-anchor="middle" class="tiny">4</text>
    

  <rect x="28" y="214" width="864" height="164" rx="14" fill="#1D2430" stroke="#2F3B4C" />
  <text x="44" y="242" class="panelLabel">Featured contribution</text>
  
    <text x="44" y="270" class="repo">jenkinsci/jenkins</text>
    <rect x="724" y="236" width="132" height="30" rx="15" fill="#33B5E5" opacity="0.18" />
    <text x="790" y="256" text-anchor="middle" class="state" fill="#33B5E5">STATUS: OPEN</text>
    <text x="44" y="302" class="prTitle">Enable native CodeMirror search</text>
    <text x="44" y="336" class="prTitle"></text>
    <text x="44" y="238" class="hidden"></text>
    <text x="600" y="306" class="panelMeta">PR #26789</text>
    <text x="600" y="334" class="panelMeta">updated May 25, 2026</text>
    <text x="740" y="306" class="panelMeta">created May 14, 2026</text>
    <text x="740" y="334" class="panelMeta">today</text>
  

  <rect x="28" y="402" width="864" height="120" rx="14" fill="#1D2430" stroke="#2F3B4C" />
  <text x="44" y="430" class="panelLabel">Recent public pull requests</text>
  
      <line x1="28" y1="430" x2="892" y2="430" stroke="#293241" stroke-width="1" />
      <circle cx="43" cy="450" r="5" fill="#33B5E5" />
      <text x="58" y="455" class="rowRepo">jenkinsci/jenkins</text>
      <text x="392" y="455" class="rowTitle">Enable native CodeMirror search</text>
      <text x="790" y="455" text-anchor="end" class="rowMeta">#26789</text>
      <text x="876" y="455" text-anchor="end" class="rowMeta">today</text>
    
      <line x1="28" y1="472" x2="892" y2="472" stroke="#293241" stroke-width="1" />
      <circle cx="43" cy="492" r="5" fill="#F2495C" />
      <text x="58" y="497" class="rowRepo">jenkinsci/jenkins</text>
      <text x="392" y="497" class="rowTitle">Add shared editor search for code editors</text>
      <text x="790" y="497" text-anchor="end" class="rowMeta">#26787</text>
      <text x="876" y="497" text-anchor="end" class="rowMeta">10 days ago</text>
    

  <style>
    .title { fill: #E5E7EB; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .live { fill: #73BF69; font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.2px; }
    .meta { fill: #8B97A7; font: 500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .panelLabel { fill: #9CA9B7; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.6px; text-transform: uppercase; }
    .bigValue { fill: #F9FAFB; font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .panelMeta { fill: #8B97A7; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .repo { fill: #33B5E5; font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .state { font: 700 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.8px; }
    .prTitle { fill: #E5E7EB; font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .rowRepo { fill: #A5D8FF; font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .rowTitle { fill: #E5E7EB; font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .rowMeta { fill: #9CA9B7; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .rowPlaceholder { fill: #6B7280; font: 500 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .axis { fill: #7B8794; font: 500 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .tiny { fill: #A5D8FF; font: 600 10px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .hidden { display: none; }
  </style>
</svg>